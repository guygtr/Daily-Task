name: Daily Ideation 🧠

on:
  schedule:
    # 9:00 AM EST = 14:00 UTC (Hiver)
    - cron: '0 14 * * *'
  workflow_dispatch: # Permet de lancer manuellement

permissions:
  contents: read
  issues: write

jobs:
  ideate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Daily Routine (Maintenance & Security)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run routine

      - name: Generate New Ideas
        id: ideas
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          npm run generate > ideas_report.md

      - name: Create GitHub Issue Summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          gh issue create \
            --title "Rapport Quotidien GTR - $DATE 🧠" \
            --body-file ideas_report.md \
            --label "innovation"
